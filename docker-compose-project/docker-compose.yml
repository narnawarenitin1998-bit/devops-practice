version: '3'

services:

  app:
    build: ./app
    container_name: node-app
    ports:
      - "3000:3000"

  nginx:
    image: nginx:latest
    container_name: nginx-server
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  redis:
    image: redis:latest
    container_name: redis-server
    ports:
      - "6379:6379"